<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Quản lý hóa đơn</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <link rel="stylesheet" href="./css/sidebar.css" />
    <link rel="stylesheet" href="./css/manage-bill.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="sidebar"></div>
    <div id="overlay" class="sidebar-overlay"></div>

    <div id="orderToast" class="order-toast">Đơn hàng mới vừa được tạo!</div>

    <div class="page-content">
      <!-- HEADER -->

      <div class="dashboard-header">
        <i class="fa-solid fa-bars menu-toggle" onclick="toggleSidebar()"></i>

        <div class="header-title">
          <h2>
            <i class="fa-solid fa-receipt"></i>
            Quản lý hóa đơn
          </h2>
        </div>
      </div>

      <select id="statusFilter" class="status-filter">
        <option value="all">Tất cả</option>
        <option value="pending">Chờ xác nhận</option>
        <option value="processing">Đang giao</option>
        <option value="done">Hoàn thành</option>
        <option value="cancel">Đã hủy</option>
      </select>

      <div class="filter-bar">
        <input type="text" id="searchBill" placeholder="Tìm mã / khách / SĐT" />

        <label>Từ</label>
        <input type="date" id="fromDate" />

        <label>Đến</label>
        <input type="date" id="toDate" />

        <button onclick="filterByDate()">Lọc</button>

        <select id="sortTime">
          <option value="new">Mới nhất</option>
          <option value="old">Cũ nhất</option>
        </select>

        <button onclick="exportExcel()">Xuất Excel</button>
      </div>

      <div class="table-wrapper">
        <table class="bill-table">
          <thead>
            <tr>
              <th>Mã</th>
              <th>Khách</th>
              <th>SĐT</th>
              <th>Thời gian</th>
              <th>Trạng thái</th>
              <th>Hành động</th>
            </tr>
          </thead>

          <tbody id="billTable">
            <tr data-status="pending" onclick="openDetail(this)">
              <td>101</td>
              <td>Nguyễn Văn A</td>
              <td>0987123456</td>
              <td>10:30</td>

              <td>
                <span class="status pending"> Chờ xác nhận </span>
              </td>

              <td onclick="event.stopPropagation()">
                <button onclick="confirmOrder(this)">Xác nhận</button>
                <button onclick="cancelOrder(this)">Hủy</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="pagination" id="pagination"></div>
    </div>

    <script src="./js/sidebar.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="./js/font-bill.js"></script>
    <script src="./js/manage-bill.js"></script>
  </body>
</html>
