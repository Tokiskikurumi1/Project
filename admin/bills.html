<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Quản lý Hóa đơn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="./css/bills.css" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/header_sidebar.css" />
  </head>
  <body>
    <div class="overlay" id="overlay"></div>

    <!-- Sidebar placeholder (đã có sidebar đẹp từ trước) -->
    <div id="sidebar-placeholder"></div>

    <div id="right-content">
      <!-- Header placeholder -->
      <div id="header-placeholder"></div>

      <main class="admin-main">
        <section class="bills-card">
          <h2><i class="fas fa-receipt"></i> Quản lý hóa đơn</h2>
          <div class="filter-bar">
            <div class="filter-group">
              <label>Từ ngày</label>
              <input type="date" id="fromDate" />
            </div>

            <div class="filter-group">
              <label>Đến ngày</label>
              <input type="date" id="toDate" />
            </div>

            <div class="filter-group">
              <label>Mức tổng tiền</label>
              <select id="totalRange">
                <option value="">-- Tất cả --</option>
                <option value="0-100000">0đ - 100.000đ</option>
                <option value="100000-300000">100.000đ - 300.000đ</option>
                <option value="300000-500000">300.000đ - 500.000đ</option>
                <option value="500000+">Trên 500.000đ</option>
              </select>
            </div>

            <div class="filter-actions">
              <button class="btn-primary" onclick="filterBills()">
                <i class="fas fa-filter"></i> Lọc
              </button>

              <button class="btn-secondary" onclick="resetFilter()">
                <i class="fas fa-rotate-left"></i> Reset
              </button>
            </div>
          </div>
          <div class="table-container">
            <table class="bills-table">
              <thead>
                <tr>
                  <th>STT</th>
                  <th>Mã hóa đơn</th>
                  <th>Ngày lập</th>
                  <th>Tổng tiền</th>
                  <th>Trạng thái</th>
                  <th>Thao tác</th>
                </tr>
              </thead>
              <tbody id="bill-list"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <!-- Modal Xem chi tiết hóa đơn -->
    <div id="billDetailModal" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="hideBillDetailForm()">&times;</span>
        <h2>
          <i class="fas fa-file-invoice-dollar"></i> Chi tiết hóa đơn #<span
            id="detailBillId"
          ></span>
        </h2>

        <div class="bill-info">
          <p><strong>Ngày lập:</strong> <span id="detailDate"></span></p>
          <p><strong>Khách hàng:</strong> <span id="detailCustomer"></span></p>
          <p><strong>SĐT:</strong> <span id="detailPhone"></span></p>
          <p><strong>Tổng tiền:</strong> <span id="detailTotal"></span></p>
        </div>

        <table class="detail-table">
          <thead>
            <tr>
              <th>Tên sản phẩm</th>
              <th>Số lượng</th>
              <th>Giá</th>
            </tr>
          </thead>
          <tbody id="detailBody"></tbody>
        </table>
        <span>Tổng tiền: <span id="totalAmount"></span></span>
        <div class="bill-history">
          <h3>Lịch sử xử lý</h3>
          <div id="billHistory"></div>
        </div>
        <div class="modal-actions">
          <button class="btn-secondary" onclick="hideBillDetailForm()">
            Đóng
          </button>
        </div>
      </div>
    </div>

    <script src="./js/bills.js"></script>
    <script src="./js/header_siderbar.js"></script>
  </body>
</html>
