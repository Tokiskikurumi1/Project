<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Quản lý Khách hàng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="./css/customer.css" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/header_sidebar.css" />
  </head>
  <body>
    <div class="overlay" id="overlay"></div>

    <!-- Sidebar placeholder -->
    <div id="sidebar-placeholder"></div>

    <div id="right-content">
      <!-- Header placeholder -->
      <div id="header-placeholder"></div>

      <main class="admin-main">
        <section class="customers-card">
          <h2><i class="fas fa-users"></i> Quản lý khách hàng</h2>
          <div class="filter-bar">
            <div class="filter-group">
              <input
                type="text"
                id="searchName"
                placeholder="Tìm theo tên khách hàng..."
                oninput="applyFilter()"
              />
            </div>

            <div class="filter-group">
              <select id="statusFilter" onchange="applyFilter()">
                <option value="">Tất cả trạng thái</option>
                <option value="1">Hoạt động</option>
                <option value="0">Đã khóa</option>
              </select>
            </div>

            <div class="filter-group">
              <button class="btn-secondary" onclick="resetFilter()">
                <i class="fas fa-rotate-left"></i> Reset
              </button>
            </div>
          </div>
          <div class="table-container">
            <table class="customers-table">
              <thead>
                <tr>
                  <th>STT</th>
                  <th>Tên khách hàng</th>
                  <th>Số điện thoại</th>
                  <th>Địa chỉ</th>
                  <th>Tổng giá trị hóa đơn</th>
                  <th>Thao tác</th>
                </tr>
              </thead>
              <tbody id="customer-list">
                <tr>
                  <td
                    colspan="6"
                    style="text-align: center; padding: 40px; color: #8d6e63"
                  >
                    Chưa có khách hàng nào
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <!-- Modal Sửa thông tin khách hàng -->
    <div id="detailCustomerModal" class="modal">
      <div class="modal-content">
        <h3>Thông tin khách hàng</h3>
        <div id="customerDetailContent">
          <p><strong>Tên khách hàng:</strong> <span id="detailName"></span></p>
          <p><strong>Giới tính:</strong> <span id="detailGender"></span></p>
          <p><strong>Địa chỉ:</strong> <span id="detailAddress"></span></p>
          <p><strong>Số điện thoại:</strong> <span id="detailPhone"></span></p>
          <p><strong>Email:</strong> <span id="detailEmail"></span></p>
          <p><strong>Ngày tạo:</strong> <span id="detailCreateAt"></span></p>
          <p><strong>Trạng thái:</strong> <span id="detailStatus"></span></p>
        </div>
        <div class="modal-actions">
          <button class="btn-secondary" onclick="hideCustomerDetail()">
            Đóng
          </button>
        </div>
      </div>
    </div>

    <script src="./js/customer.js"></script>
    <script src="./js/header_siderbar.js"></script>
  </body>
</html>
